# Fencecrete OPS — DB-side tests CI
#
# Runs every `supabase/tests/*.sql` file against the production Supabase
# database via the Management API. Tests are BEGIN/ROLLBACK wrapped, so
# no production data is mutated — even on failure, the transaction is
# rolled back automatically.
#
# Triggers:
#   - push to main (catches anything that lands)
#   - pull_request (gates merges; PR check turns red on test failure)
#   - workflow_dispatch (manual run from the GitHub Actions UI)
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN  (Personal Access Token, format: sbp_...)
#                            Generate at https://supabase.com/dashboard/account/tokens
#   - SUPABASE_PROJECT_REF   (project ID — for OPS, this is bdnwjokehfxudheshmmj)
#
# How the workflow runs each test:
#   POST https://api.supabase.com/v1/projects/{ref}/database/query
#   Body: { "query": "<contents of the .sql file>" }
#   Headers: Authorization: Bearer $SUPABASE_ACCESS_TOKEN
#   On success: response is a JSON array (the rowset returned by the
#               final SELECT in the test file).
#   On failure: response has non-2xx status with a JSON error body
#               (e.g., {"code":"P0001","message":"TEST 2: ..."}).
#               The script propagates the failure and fails the build.

name: DB tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  run-sql-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          missing=()
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then missing+=("SUPABASE_ACCESS_TOKEN"); fi
          if [ -z "$SUPABASE_PROJECT_REF" ];  then missing+=("SUPABASE_PROJECT_REF");  fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo ""
            echo "Add them at: Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "  SUPABASE_ACCESS_TOKEN — Generate at https://supabase.com/dashboard/account/tokens"
            echo "                          (Personal Access Token, format sbp_...)"
            echo "  SUPABASE_PROJECT_REF  — bdnwjokehfxudheshmmj"
            exit 1
          fi

      - name: Run all supabase/tests/*.sql files
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(supabase/tests/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No supabase/tests/*.sql files found. Nothing to run."
            exit 0
          fi

          fail_count=0
          pass_count=0
          declare -a failures

          for f in "${files[@]}"; do
            echo ""
            echo "──────────────────────────────────────────────────────────────"
            echo "▶ Running: $f"
            echo "──────────────────────────────────────────────────────────────"

            # JSON-encode the SQL file contents (handles quotes, newlines, etc).
            payload=$(jq -Rs '{query: .}' < "$f")

            # Capture both body + status code in one call.
            response=$(mktemp)
            http_code=$(curl -sS \
              -o "$response" \
              -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query")

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              # Success path — response is a JSON array of {id, test, status} rows.
              n=$(jq 'length' < "$response")
              echo "✅ PASS — $n assertions"
              # Pretty-print the rows so the workflow log shows what passed.
              jq -r '.[] | "  \(.id). [\(.status)] \(.test)"' < "$response" || cat "$response"
              pass_count=$((pass_count + 1))
            else
              # Failure path — log the error body and continue running other tests
              # so we get a complete picture instead of stopping on the first failure.
              echo "❌ FAIL — HTTP $http_code"
              cat "$response"
              echo ""
              fail_count=$((fail_count + 1))
              failures+=("$f")
            fi

            rm -f "$response"
          done

          echo ""
          echo "══════════════════════════════════════════════════════════════"
          echo "Test summary"
          echo "══════════════════════════════════════════════════════════════"
          echo "  Files passed: $pass_count"
          echo "  Files failed: $fail_count"

          if [ "$fail_count" -ne 0 ]; then
            echo ""
            echo "Failed files:"
            for f in "${failures[@]}"; do
              echo "  • $f"
            done
            exit 1
          fi
